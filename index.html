            function restrictToSevenDigits(input) {
                let value = input.value.replace(/\D/g, ''); // Remove non-numeric characters
                if (value.length !== 7) {
                    input.value = ''; // Clear the input if it's not exactly 7 digits
                } else {
                    input.value = value; // Retain the valid 7-digit input
                }
            }
            function validatePhones() {
                var guardianPhone = $('#gardianPhone').val();
                var motherPhone = $('#motherPhone').val();

                if (guardianPhone === motherPhone) {
                    $('#gardianPhone').val('');
                    $('#motherPhone').val('');
                }
            }            
            function validateNameLength(inp){
                var nameLength = inp.value;
                if(nameLength.length < 4){
                    inp.value = inp.value.replace(nameLength, "");
                } else {
                    var characterOnly = /[0-9]/g.test(nameLength);
                    if (characterOnly) {
                        inp.value = inp.value.replace(nameLength, "");
                    }   
                }
            }            
            function validateUnicode(inp){
                var studentNameBan = inp.value;
                if(studentNameBan.length < 4){
                    inp.value = inp.value.replace(studentNameBan, "");
                } else {
                    var containsUnicode = /[^\u0000-\u007F]/.test(studentNameBan);
                    if (!containsUnicode) {
                        inp.value = inp.value.replace(studentNameBan, "");
                    }   
                }
            }
            function validateNID(inp){
                var NID = inp.value;
                if(NID.length < 10){
                    inp.value = inp.value.replace(NID, "");
                } else {
                    var digitOccurrences = (NID.match(/[1-9]/g) || []).length;
                    if (digitOccurrences >= 4) {
                      var fiveSameDigits = /([1-9])\1{4,}/.test(NID);
                      if (fiveSameDigits) {
                        inp.value = inp.value.replace(NID, "");
                      }
                    } else {
                        inp.value = inp.value.replace(NID, "");
                    }                    
                }                
            }
            function validateMobilNo(inp){
                var mobileNo = inp.value;

                evt.currentTarget.className += " active";

            function readURL(input)
            {
                if (input.files && input.files[0])
                {
                    var reader = new FileReader();

                    var imgPath = $('#fileToUpload')[0].value;
                    var extn = imgPath.substring(imgPath.lastIndexOf('.') + 1).toLowerCase();

                    if (extn == "gif" || extn == "png" || extn == "jpg")
                    {
                        var dt = input.files[0].size;
                        if (dt < 1022976)
                        {
                            reader.onload = function (e)
                            {
                                $('#studentImg')
                                       .attr('src', e.target.result)
                                       .width(200)
                                       .height(200);
                            };

                            reader.readAsDataURL(input.files[0]);
                            $('#fError').html('');
                            $('#ftoUP').html('File Size: ' + Math.round(dt / 1024) + ' KB');
                        } else
                        {
                            $('#fileToUpload')[0].value = '';
                            $('#studentImg').attr('src', '');
                            $('#fError').html('File size exceeded');
                        }
                    } else
                    {
                        $('#fileToUpload')[0].value = '';
                        $('#studentImg').attr('src', '');
                        $('#fError').html('Unknown format');
                    }
                }
            }
